<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guitarra · Jukebox</title>
<style>
/* Página totalmente en blanco: la cara MOAP no debe mostrar nada.
   El botón de fallback de autoplay cubre toda la pantalla pero es
   invisible: un clic en cualquier punto de la cara arranca el audio. */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#fff;overflow:hidden}
#playbtn{
  display:none;position:fixed;inset:0;width:100%;height:100%;
  background:#fff;border:none;cursor:pointer;
}
body.blocked #playbtn{display:block}
</style>
</head>
<body>
<button id="playbtn" aria-label="Reproducir"></button>
<script>
// URLSearchParams ya aplica decodeURIComponent a cada parámetro.
var qs   = new URLSearchParams(location.search);
var song = (qs.get('song') || '').trim();

// Solo se bloquean rutas (traversal); mayúsculas, espacios o acentos en el
// nombre son válidos: encodeURIComponent los codifica al pedir el archivo.
if (song && song.indexOf('/') === -1 && song.indexOf('\\') === -1 && song.indexOf('..') === -1) {
  var audio = new Audio('songs/' + encodeURIComponent(song));
  // Volumen base 0-100 desde la URL (?vol=). El script LSL envía 1-10 y si
  // el parámetro faltara caemos a 5, el mismo VOLUME_DEFAULT del script:
  // nunca atronar por accidente.
  var vol = parseInt(qs.get('vol'), 10);
  if (isNaN(vol)) vol = 5;
  audio.volume = Math.min(100, Math.max(0, vol)) / 100;
  if (qs.get('loop') === '1') audio.loop = true;

  function tryPlay(){
    audio.play().then(function(){
      document.body.classList.remove('blocked');
    }).catch(function(){
      // Autoplay bloqueado por el navegador: un clic en la cara (botón
      // invisible a pantalla completa) arranca la reproducción.
      document.body.classList.add('blocked');
    });
  }
  document.getElementById('playbtn').addEventListener('click', tryPlay);
  tryPlay();
}
</script>
</body>
</html>
